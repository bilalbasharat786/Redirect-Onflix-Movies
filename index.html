<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifying Connection | StreamFree</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #dc2626; /* Red-600 */
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 24px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .title { font-size: 20px; font-weight: bold; margin-bottom: 8px; color: #9ca3af; letter-spacing: 3px; }
        .subtitle { font-size: 14px; color: #4b5563; }
        /* Turnstile div ko chupa diya taake silently verify ho */
        .cf-turnstile { margin-top: 20px; display: none; }
    </style>
</head>
<body>
    <div class="spinner" id="spinner"></div>
    <div class="title" id="status-title">VERIFYING CONNECTION</div>
    <div class="subtitle" id="status-desc">Ensuring you are not a bot...</div>

    <div class="cf-turnstile" data-sitekey="0x4AAAAAAC5iBup6tFFw1Smo" data-callback="onSuccess" data-error-callback="onError"></div>

    <script>
        function onSuccess(token) {
            document.getElementById('status-title').innerText = "VERIFICATION SUCCESSFUL";
            document.getElementById('status-title').style.color = "#22c55e"; // Green color
            document.getElementById('status-desc').innerText = "Redirecting to StreamFree Network...";
            
            // 1.5 seconds delay ke baad asli website par bhejna with Secret Tokens
            setTimeout(() => {
                window.location.href = "https://onflixstream.vercel.app/?verified=true&pass=streamfree2026";
            }, 1500);
        }

        function onError() {
            document.getElementById('spinner').style.display = "none";
            document.getElementById('status-title').innerText = "VERIFICATION FAILED";
            document.getElementById('status-title').style.color = "#dc2626"; // Red color
            document.getElementById('status-desc').innerText = "Access Denied. Are you a bot?";
        }
    </script>
</body>
</html>
