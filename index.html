<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifying... | OnFlix</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen flex-col text-center px-4">
    
    <h1 class="text-4xl font-extrabold text-red-600 mb-2">OnFlix Movies</h1>
    <p class="text-gray-400 mb-8 font-medium">Please verify you are a human to enter the site.</p>

    <div class="cf-turnstile" data-sitekey="YAHAN_APNI_SITE_KEY_PASTE_KARO" data-callback="redirectUser"></div>

    <script>
        // Jab user Verify par tick kar dega, toh yeh function chalega
        function redirectUser(token) {
            // Asli movies wali site ka link yahan daalo
            const mainWebsite = "https://on-flix-movies-a7we.vercel.app";
            
            // 2 second ka delay taake user ko "Success" nazar aaye, phir redirect!
            setTimeout(() => {
                window.location.href = mainWebsite;
            }, 1500);
        }
    </script>

</body>
</html>
