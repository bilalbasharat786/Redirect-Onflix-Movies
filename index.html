<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifying... | OnFlix</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen flex-col text-center px-4">
    
    <h1 class="text-5xl font-extrabold text-red-600 mb-2">OnFlix Movies</h1>
    <p class="text-gray-400 mb-8 font-medium">Your Ultimate Destination for Movies.</p>

    <div id="welcome-section">
        <button 
            onclick="startVerification()" 
            class="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-8 rounded-full text-lg shadow-lg transform transition hover:scale-105 active:scale-95"
        >
            GO TO HOME
        </button>
    </div>

    <div id="verification-section" class="hidden">
        <p class="text-gray-300 mb-4 animate-pulse">Verifying your connection...</p>
        <div id="turnstile-container"></div>
    </div>

    <script>
        // Jab user button dabaye tabhi verification start hogi
        function startVerification() {
            // UI Change karo
            document.getElementById('welcome-section').classList.add('hidden');
            document.getElementById('verification-section').classList.remove('hidden');

            // 🔥 Ab verification widget ko manually load karo
            turnstile.render('#turnstile-container', {
                sitekey: '0x4AAAAAACkvuRqmnf-K5K7q',
                callback: function(token) {
                    redirectUser(token);
                },
            });
        }

        function redirectUser(token) {
            sessionStorage.setItem("onflix_verified", "true");
            const secretCode = "aHR0cHM6Ly9vbi1mbGl4LW1vdmllcy1hN3dlLnZlcmNlbC5hcHA=";
            const mainWebsite = atob(secretCode);
            
            setTimeout(() => {
                window.location.href = mainWebsite;
            }, 1500);
        }
    </script>

</body>
</html>
